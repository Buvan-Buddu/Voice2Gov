<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Voice2Gov - Create New Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1C4980",
                        "primary-light": "#EEF2F6",
                        "on-surface": "#1C4980",
                        "on-surface-variant": "#667085",
                        "outline": "#D0D5DD",
                        "surface": "#FFFFFF",
                        "background": "#F5F7F9"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "2xl": "1.25rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-ring:focus-within {
            border-color: #1C4980;
            box-shadow: 0 0 0 4px rgba(28, 73, 128, 0.1);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface antialiased min-h-screen flex flex-col items-center p-4">
<!-- Header with Back Button -->
<header class="w-full max-w-[440px] flex items-center justify-between mb-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 transition-colors" type="button">
<span class="material-symbols-outlined text-on-surface text-2xl">arrow_back</span>
</button>
<div class="w-10 h-10"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Content -->
<main class="w-full max-w-[440px] flex-grow flex flex-col justify-center pb-8">
<!-- Brand Header (Matched to Login Screen) -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-primary text-white mb-4 shadow-sm">
<span class="material-symbols-outlined text-2xl filled">graphic_eq</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-primary">Voice2Gov</h1>
<p class="text-on-surface-variant text-sm mt-1">Empowering civic change through voice</p>
</div>
<!-- Create Password Card -->
<div class="bg-surface rounded-2xl p-8 md:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-[#E4E7EC]">
<h2 class="text-xl font-semibold mb-6">Create New Password</h2>
<p class="text-on-surface-variant text-sm mb-8">Set a strong password to secure your account.</p>
<form class="space-y-5">
<!-- New Password Field -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface">New Password</label>
<div class="relative group input-focus-ring border border-outline rounded-lg transition-all">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-transparent border-none rounded-lg py-3 pl-11 pr-12 text-on-surface placeholder:text-gray-400 focus:ring-0 transition-all outline-none text-sm" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-on-surface">Confirm Password</label>
<div class="relative group input-focus-ring border border-outline rounded-lg transition-all">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-transparent border-none rounded-lg py-3 pl-11 pr-12 text-on-surface placeholder:text-gray-400 focus:ring-0 transition-all outline-none text-sm" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Password Requirements -->
<div class="space-y-2.5 pt-2">
<div class="flex items-center gap-2.5 text-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[18px] text-primary/40">check_circle</span>
<span>At least 8 characters</span>
</div>
<div class="flex items-center gap-2.5 text-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[18px] text-primary/40">check_circle</span>
<span>One uppercase letter</span>
</div>
<div class="flex items-center gap-2.5 text-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[18px] text-primary/40">check_circle</span>
<span>One number</span>
</div>
</div>
<!-- Primary CTA -->
<div class="pt-4">
<button class="w-full py-3.5 bg-primary text-white font-semibold rounded-lg shadow-sm hover:bg-[#153a66] transition-all flex items-center justify-center gap-2" type="submit">
<span>Reset Password</span>
<span class="material-symbols-outlined text-[18px] filled">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Site Footer Links -->
<div class="mt-8 flex justify-center gap-8">
<a class="text-xs font-medium text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-xs font-medium text-on-surface-variant hover:text-primary transition-colors" href="#">Civic Standards</a>
<a class="text-xs font-medium text-on-surface-variant hover:text-primary transition-colors" href="#">Support</a>
</div>
</main>
</body></html>
