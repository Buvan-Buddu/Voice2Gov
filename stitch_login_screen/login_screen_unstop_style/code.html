<body class="bg-unstop-blue-light font-body text-on-surface antialiased min-h-[884px] flex items-center justify-center p-4" data-stitch-vh="min-h-[884px]===min-h-screen" data-mode="connect">
<!-- Login Container -->
<main class="w-full max-w-[440px]">
<div class="bg-white rounded-[12px] p-8 md:p-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-unstop-border">
<!-- Branding -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-primary text-white mb-6">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-[#003263] mb-1">Voice2Gov</h1>
<p class="text-on-surface-variant text-sm font-medium">Digital Concierge for Civic Change</p>
</div>
<!-- SSO Login Options -->
<div class="space-y-3 mb-8">
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 border border-unstop-border rounded-[12px] font-semibold text-sm hover:bg-gray-50 transition-all text-gray-700">
<img alt="Google" class="w-5 h-5" src="https://imgs.search.brave.com/JRpwYzMw_Tnp6NxstRmBDM9kw8yQlaUyAR7WbU9b-F0/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly90My5m/dGNkbi5uZXQvanBn/LzEzLzU3LzMyLzQ2/LzM2MF9GXzEzNTcz/MjQ2MjhfYUd2bUxK/OE1UMmNORWtwaHda/R0R6MU5IMWpqckR2/bVguanBn">
<span class="">Login with Google</span>
</button>
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 border border-unstop-border rounded-[12px] font-semibold text-sm hover:bg-gray-50 transition-all text-gray-700">
<span class="material-symbols-outlined text-xl">account_balance</span>
<span>Login via Agency SSO</span>
</button>
</div>
<div class="relative flex items-center gap-4 mb-8">
<div class="h-px flex-1 bg-unstop-border"></div>
<span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">OR</span>
<div class="h-px flex-1 bg-unstop-border"></div>
</div>
<!-- Form -->
<form class="space-y-5">
<!-- Email Input -->
<div class="space-y-1.5">
<label class="block text-xs font-bold text-gray-600 px-1 uppercase tracking-tight">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-white border border-unstop-border rounded-[12px] py-3.5 pl-12 pr-4 text-on-surface placeholder:text-gray-400 focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all outline-none text-sm" placeholder="e.g. name@agency.gov" type="email">
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<div class="flex justify-between items-end px-1">
<label class="block text-xs font-bold text-gray-600 uppercase tracking-tight">Password</label>
<a class="text-xs font-bold text-primary hover:underline underline-offset-2 transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
